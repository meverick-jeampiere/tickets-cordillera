/* Libro clickeable: invita a abrir */
.book-cover.open-trigger{
  cursor:pointer;
  transform-origin:left center;
  animation:bookBreath 3.4s ease-in-out infinite;
  transition:
    transform .45s cubic-bezier(.2,.8,.2,1),
    box-shadow .45s ease,
    filter .45s ease;
}

.book-cover.open-trigger:hover{
  transform:perspective(1200px) rotateY(-4deg) translateY(-4px);
  box-shadow:
    0 42px 90px rgba(22,16,10,.30),
    0 0 0 1px rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,255,255,.32);
  filter:saturate(1.04) contrast(1.02);
}

@keyframes bookBreath{
  0%, 100%{
    transform:perspective(1200px) rotateY(0deg) translateY(0);
  }
  50%{
    transform:perspective(1200px) rotateY(-2.2deg) translateY(-3px);
  }
}

/* Botones técnico-didácticos I y II */
.guide-tech-card{
  --cut:6px;
  --cut2:12px;

/* Azul hielo editorial */
--ice-text:#174d6c;
--ice-main:#174d6c;
--ice-border:rgba(23,77,108,.34);
--ice-border-soft:rgba(23,77,108,.22);
--ice-bg:rgba(214,237,247,.30);

--card-border:var(--ice-border);

  position:relative;
width:100%;
min-height:54px;

display:grid;
grid-template-columns:1fr;
align-items:center;

margin:1.4% 0 1.5%;
padding:0 3.8% 0 6.4%;

   border:1px solid var(--ice-border-soft);
  background:
    linear-gradient(90deg, rgba(43,111,146,.075), rgba(255,253,247,.84)),
    rgba(214,237,247,.20);

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  box-shadow:
    0 10px 24px rgba(22,16,10,.04),
    inset 0 0 0 1px rgba(255,255,255,.55);

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease;
}

/* NO recortes el botón completo, porque eso oculta el círculo verde */
.guide-tech-card{
  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;
}

/* Caja verde con entradas circulares hacia adentro */
.guide-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
  linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
  rgba(214,237,247,.20);

  -webkit-mask:
  radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

mask:
  radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

/* Borde completo exacto: líneas rectas + esquinas circulares hacia adentro */
.guide-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    /* línea superior */
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    /* línea inferior */
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    /* línea izquierda */
    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    /* línea derecha */
    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    /* esquina superior izquierda */
    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    /* esquina superior derecha */
    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    /* esquina inferior izquierda */
    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    /* esquina inferior derecha */
    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}
/* Línea horizontal tenue debajo de cada caja verde */
.guide-tech-card .tech-content::after{
  content:none;
}

.guide-tech-card .tech-separator{
  display:none;
}

.guide-tech-card::selection{
  background:transparent;
}


/* Hover sutil */
.guide-tech-card:hover{
  transform:translateX(3px);
  border-color:rgba(23,77,108,.44);

    0 15px 32px rgba(23,77,108,.08),

/* Círculo azul hielo con copo: misma columna que 01, 02, 03, 04 */
.tech-icon{
  position:absolute;
  left:calc(-1 * var(--content-left) + var(--marker-left) - 46px / 2);
  top:50%;
  transform:translateY(-50%);

  width:46px;

  border-radius:50%;

    background:#2b6f92;

  display:flex;

  font-size:35px;
  line-height:1;

    box-shadow:
    0 10px 22px rgba(47,127,166,.22),
    0 0 14px rgba(130,205,238,.20),
    inset 0 0 0 1px rgba(255,255,255,.32);

  z-index:5;
}

/* Borde punteado alrededor del círculo azul hielo */
.tech-icon::before{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;
  border:1px dashed rgba(75,151,190,.34);
  pointer-events:none;
}

/* Segmento punteado que conecta por arriba y por abajo el círculo azul hielo */
.tech-icon::after{
  content:"";
  position:absolute;
  left:50%;
  top:-42px;
  transform:translateX(-50%);
  width:1px;
  height:calc(100% + 84px);
  border-left:1px dashed rgba(75,151,190,.26);
  z-index:-1;
}

/* Botones técnico-didácticos para IV, V y VI */
.snow-tech-card{
  --cut:6px;
  --cut2:12px;

  --ice-text:#174d6c;
  --ice-main:#174d6c;
  --ice-border:rgba(23,77,108,.34);
  --ice-border-soft:rgba(23,77,108,.22);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:54px;

  display:grid;
  grid-template-columns:1fr;
  align-items:center;

  margin:1.4% 0 1.5%;
  padding:0 3.8% 0 6.4%;

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease;
}

.snow-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
    linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
    rgba(214,237,247,.20);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

.snow-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

  transform:translate(-50%,-50%);

    radial-gradient(circle at 35% 30%, rgba(255,255,255,.98), rgba(255,245,233,.94) 58%, rgba(236,219,203,.92) 100%);
  border:1px solid rgba(167,101,32,.24);
  box-shadow:
    0 10px 24px rgba(20,13,6,.16),
    0 0 0 5px rgba(255,255,255,.12),
    inset 0 1px 0 rgba(255,255,255,.86);
  transition:
    left .34s cubic-bezier(.22,.8,.22,1),
    transform .2s ease,
    box-shadow .2s ease;
}

.reader-progress:hover .reader-progress-thumb,
.reader-progress.is-dragging .reader-progress-thumb{
  transform:translate(-50%,-50%) scale(1.08);
  box-shadow:
    0 12px 28px rgba(20,13,6,.18),
    0 0 0 6px rgba(255,255,255,.14),
    inset 0 1px 0 rgba(255,255,255,.9);
}

.reader-preview{
  position:absolute;
  left:var(--preview-left);
  bottom:28px;
  transform:translateX(-50%) translateY(8px) scale(.96);
  width:210px;
  padding:10px 10px 11px;
  border-radius:20px;
  opacity:0;
  pointer-events:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.72)),
    rgba(255,255,255,.78);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:
    0 24px 60px rgba(20,13,6,.18),
    inset 0 1px 0 rgba(255,255,255,.82),
    0 0 0 1px rgba(90,72,46,.06);
  transition:
    opacity .22s ease,
    transform .22s ease,
    left .08s linear;
  z-index:40;
}

.reader-preview::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-8px;
  width:16px;
  height:16px;
  transform:translateX(-50%) rotate(45deg);
  border-radius:3px;
  background:rgba(255,255,255,.84);
  box-shadow:1px 1px 10px rgba(20,13,6,.06);
}

.reader-progress:hover .reader-preview,
.reader-progress.is-dragging .reader-preview,
.reader-preview.is-visible{
  opacity:1;
  transform:translateX(-50%) translateY(0) scale(1);
}

.reader-preview-image{

/* Botones técnicos X, XI, XII y XIII */
.summit-tech-card{
  --cut:6px;
  --cut2:12px;

  --ice-text:#174d6c;
  --ice-border:rgba(23,77,108,.34);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:52px;

  display:grid;
  grid-template-columns:1fr;
  align-items:center;

  margin:1.15% 0 1.25%;
  padding:0 3.8% 0 6.4%;

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;

  transition:
    transform .25s ease,
    box-shadow .25s ease;
}

.summit-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
    linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
    rgba(214,237,247,.20);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

.summit-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

/* Icono azul con línea punteada vertical */

/* Botones técnicos XIV, XV, XVI */
.expedition-tech-card{
  --cut:6px;
  --cut2:12px;

  --ice-text:#174d6c;
  --ice-border:rgba(23,77,108,.34);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:54px;

  display:grid;
  grid-template-columns:1fr;
  align-items:center;

  margin:1.4% 0 1.5%;
  padding:0 3.8% 0 6.4%;

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease;
}

.expedition-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
    linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
    rgba(214,237,247,.20);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

.expedition-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

.expedition-tech-card:hover{
  transform:translateX(3px);
  box-shadow:
    0 15px 32px rgba(23,77,108,.08),
    inset 0 0 0 1px rgba(255,255,255,.68);
}

.expedition-tech-icon{
  position:absolute;
  left:calc(-1 * var(--content-left) + var(--marker-left) - 46px / 2);
  top:50%;
  transform:translateY(-50%);

  width:46px;
  height:46px;
  border-radius:50%;

}

.expedition-tech-icon::before{
  content:"";

}

.sixth-tech-card{

  position:relative;
  width:100%;

.sixth-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,

    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;
}

.sixth-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - 1px), var(--card-border) calc(var(--cut) - .5px), var(--card-border) calc(var(--cut) + .5px), transparent calc(var(--cut) + 1px)) top left / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - 1px), var(--card-border) calc(var(--cut) - .5px), var(--card-border) calc(var(--cut) + .5px), transparent calc(var(--cut) + 1px)) top right / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - 1px), var(--card-border) calc(var(--cut) - .5px), var(--card-border) calc(var(--cut) + .5px), transparent calc(var(--cut) + 1px)) bottom left / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - 1px), var(--card-border) calc(var(--cut) - .5px), var(--card-border) calc(var(--cut) + .5px), transparent calc(var(--cut) + 1px)) bottom right / var(--cut2) var(--cut2) no-repeat;
}

.tenth-tech-card{
  --cut:7px;
  --cut2:14px;
  --ice-text:#245b7c;
  --ice-border:rgba(54,116,154,.34);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:64px;
  display:grid;
  grid-template-columns:1fr;
  align-items:center;
  margin:0 0 4.6%;

  background:transparent;
  overflow:visible;
  box-shadow:none;
  cursor:pointer;
  transition:transform .24s ease, box-shadow .24s ease;
}

.tenth-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    linear-gradient(90deg, rgba(55,120,158,.08), rgba(255,253,247,.90)),
    rgba(214,237,247,.26);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;
}

.tenth-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,
    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

  transform:translateX(-50%) translateY(18px);

  display:flex;
  justify-content:center;
  align-items:center;
  pointer-events:none;
  opacity:0;
  transition:
    opacity .28s ease,
    transform .28s ease;
  z-index:9999;
}

.fullscreen-bottom-reveal.is-visible{
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}

  width:100%;
  max-width:none;
  margin:0;
  padding:0;

  width:100%;

function getPageSize(){
  const stage = stageElement.getBoundingClientRect();
  const isPortrait = window.matchMedia('(orientation: portrait)').matches;

  const availableW = Math.max(300, stage.width - 12);
  const availableH = Math.max(420, stage.height - 12);

  if (isPortrait) {
    const ratio = 2121 / 3000;
    let h = availableH * 0.965;
    let w = h * ratio;

    if (w > availableW * 0.965) {
      w = availableW * 0.965;
      h = w / ratio;
    }

    return {
      width: Math.round(w),
      height: Math.round(h)
    };
  }

  const ratio = 1.72;

  let heightFactor = 0.955;
  let widthFactor = 0.965;

  if (window.innerHeight <= 980) heightFactor = 0.93;
  if (window.innerHeight <= 900) heightFactor = 0.905;
  if (window.innerHeight <= 820) heightFactor = 0.88;

  let h = availableH * heightFactor;
  let w = h * ratio;

  if (w > availableW * widthFactor) {
    w = availableW * widthFactor;
    h = w / ratio;
  }

  return {
    width: Math.round(w),
    height: Math.round(h)
  };
}

  document.querySelectorAll('template[data-page]').forEach((template)=>{

    const isDesktopOnly = template.hasAttribute('data-desktop-only');

    // En laptop/horizontal, no cargo páginas solo móviles
    if(isMobileOnly && !isPortrait) return;

    // En móvil/vertical, no cargo páginas solo laptop

function updateReaderProgress(previewIndex = null){

  const current = pageFlip.getCurrentPageIndex();
  const total = pageFlip.getPageCount();

  const activeIndex = previewIndex ?? current;
  const ratio = total <= 1 ? 0 : activeIndex / (total - 1);
  const progress = `${Math.max(0, Math.min(100, ratio * 100))}%`;

  readerProgress.style.setProperty('--progress', progress);

  if(readerProgressFill){
    readerProgressFill.style.width = progress;
  }

  if(readerProgressThumb){
    readerProgressThumb.style.left = progress;

  readerProgress.setAttribute('aria-valuemin', '1');

  if(key){

async function toggleFullscreen(){

        target.webkitRequestFullscreen();
      }else if(target.msRequestFullscreen){
        target.msRequestFullscreen();
      }else{

      if(document.exitFullscreen){
        await document.exitFullscreen();
      }else if(document.webkitExitFullscreen){
        document.webkitExitFullscreen();

        document.msExitFullscreen();

    showFullscreenPreview(getFullscreenIndexFromClientX(event.clientX), event.clientX);

    clearTimeout(hideTimer);
    revealBar.classList.add("is-visible");
  });

  fullscreenReaderProgress.addEventListener("pointermove", (event) => {
    if (!isFullscreenNow() || !pageFlip) return;

    const index = getFullscreenIndexFromClientX(event.clientX);

    if (isDraggingFullscreenProgress) {
      event.preventDefault();
      updateFullscreenThumbFromClientX(event.clientX);
      showFullscreenPreview(index, event.clientX);
    } else {
      showFullscreenPreview(index, event.clientX);
    }
  });

  fullscreenReaderProgress.addEventListener("pointerup", (event) => {
    if (!isFullscreenNow() || !pageFlip) return;
    finishFullscreenDrag(event);
    hideFullscreenPreview(140);
  });

  fullscreenReaderProgress.addEventListener("pointercancel", (event) => {
    isDraggingFullscreenProgress = false;
    fullscreenReaderProgress.classList.remove("is-dragging");
    hideFullscreenPreview(80);

    try {
      fullscreenReaderProgress.releasePointerCapture?.(event.pointerId);
    } catch (_) {}
  });

  fullscreenReaderProgress.addEventListener("pointerleave", () => {
    if (!isDraggingFullscreenProgress) {
      hideFullscreenPreview(80);
    }
  });
}

    document.addEventListener("mousemove", (e) => {

  if (!isFullscreenNow()) return;
  const threshold = Math.max(window.innerHeight * 0.16, 120);
  const nearBottom = e.clientY >= window.innerHeight - threshold;
  if (nearBottom) {
    if (!isDraggingFullscreenProgress) {
      syncFullscreenProgressFromMain();
    }
    showRevealBar();
  }
});

    revealBar.addEventListener("mouseenter", () => {
      if (!isFullscreenNow()) return;
      clearTimeout(hideTimer);
      revealBar.classList.add("is-visible");
    });

    revealBar.addEventListener("mouseleave", () => {
      if (!isFullscreenNow()) return;
      hideTimer = setTimeout(() => {
        revealBar.classList.remove("is-visible");
      }, 500);
    });
const mainFillObserverTarget = document.getElementById("readerProgressFill");

if (mainFillObserverTarget) {
  const observer = new MutationObserver(() => {
    if (!isDraggingFullscreenProgress) {
      syncFullscreenProgressFromMain();
    }
  });

  observer.observe(mainFillObserverTarget, {
    attributes: true,
    attributeFilter: ["style"]
  });
}
    setFullscreenState();
  })();
</script>
