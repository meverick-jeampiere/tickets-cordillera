    :root{
  --paper:#fffdf7;
  --paper-warm:#f5efe5;

  --text:#17120d;
  --muted:#7d756c;
  --line:rgba(20,18,14,.22);

    *{box-sizing:border-box;}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.94), transparent 38%),

      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:radial-gradient(rgba(80,65,42,.10) .55px, transparent .55px);
      background-size:10px 10px;
      opacity:.18;
      mix-blend-mode:multiply;
    }

    .app{
      width:100vw;
      height:100dvh;
      display:grid;
      grid-template-rows:20px minmax(0,1fr) 18px;
      gap:5px;
      padding:8px 10px 7px;
    }

    .topbar,.footer-reader{

      max-width:1780px;
      margin:0 auto;
      color:#5e574f;

    }

    .topbar{
      display:flex;

    .hint{opacity:.7;text-align:right;}

    .stage{
  position:relative;
  width:100%;
  max-width:1780px;
  height:100%;
  min-height:0;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:6px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.62);
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.80), transparent 38%),
    linear-gradient(180deg, rgba(255,255,255,.50), rgba(255,255,255,.14));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.76), var(--shadow);
}
.fullscreen-btn{
  position:absolute;
  top:40px;
  right:30px;
  z-index:30;

  width:40px;
  height:40px;
  border:none;
  border-radius:999px;

  display:none;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,.78);
  color:#1b2433;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  box-shadow:
    0 10px 24px rgba(20,13,6,.16),
    inset 0 1px 0 rgba(255,255,255,.72);

  font-size:18px;
  font-weight:700;
  cursor:pointer;

  transition:
    transform .22s ease,
    background .22s ease,
    box-shadow .22s ease,
    opacity .22s ease;
}

.fullscreen-btn:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.9);
  box-shadow:
    0 14px 30px rgba(20,13,6,.20),
    inset 0 1px 0 rgba(255,255,255,.8);
}

.fullscreen-btn:active{
  transform:translateY(0);
}

.fullscreen-btn.is-visible{
  display:flex;
}

.fullscreen-btn.is-fullscreen{
  font-size:16px;
}

    #book{

    .cover-side{

      display:flex;

        inset 0 0 0 1px rgba(255,255,255,.28);

/* Libro clickeable: invita a abrir */
.book-cover.open-trigger{
  cursor:pointer;
  transform-origin:left center;
  animation:bookBreath 3.4s ease-in-out infinite;
  transition:
    transform .45s cubic-bezier(.2,.8,.2,1),
    box-shadow .45s ease,
    filter .45s ease;
}

.book-cover.open-trigger:hover{
  transform:perspective(1200px) rotateY(-4deg) translateY(-4px);
  box-shadow:
    0 42px 90px rgba(22,16,10,.30),
    0 0 0 1px rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,255,255,.32);
  filter:saturate(1.04) contrast(1.02);
}

@keyframes bookBreath{
  0%, 100%{
    transform:perspective(1200px) rotateY(0deg) translateY(0);
  }
  50%{
    transform:perspective(1200px) rotateY(-2.2deg) translateY(-3px);
  }
}

/* Botones técnico-didácticos I y II */
.guide-tech-card{
  --cut:6px;
  --cut2:12px;

/* Azul hielo editorial */
--ice-text:#174d6c;
--ice-main:#174d6c;
--ice-border:rgba(23,77,108,.34);
--ice-border-soft:rgba(23,77,108,.22);
--ice-bg:rgba(214,237,247,.30);

--card-border:var(--ice-border);

  position:relative;
width:100%;
min-height:54px;

display:grid;
grid-template-columns:1fr;
align-items:center;

margin:1.4% 0 1.5%;
padding:0 3.8% 0 6.4%;

   border:1px solid var(--ice-border-soft);
  background:
    linear-gradient(90deg, rgba(43,111,146,.075), rgba(255,253,247,.84)),
    rgba(214,237,247,.20);

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  box-shadow:
    0 10px 24px rgba(22,16,10,.04),
    inset 0 0 0 1px rgba(255,255,255,.55);

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease;
}

/* NO recortes el botón completo, porque eso oculta el círculo verde */
.guide-tech-card{
  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;
}

/* Caja verde con entradas circulares hacia adentro */
.guide-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
  linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
  rgba(214,237,247,.20);

  -webkit-mask:
  radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

mask:
  radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
  radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

/* Borde completo exacto: líneas rectas + esquinas circulares hacia adentro */
.guide-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    /* línea superior */
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    /* línea inferior */
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    /* línea izquierda */
    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    /* línea derecha */
    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    /* esquina superior izquierda */
    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    /* esquina superior derecha */
    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    /* esquina inferior izquierda */
    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    /* esquina inferior derecha */
    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}
/* Línea horizontal tenue debajo de cada caja verde */
.guide-tech-card .tech-content::after{
  content:none;
}

.guide-tech-card .tech-separator{
  display:none;
}

.guide-tech-card::selection{
  background:transparent;
}


/* Hover sutil */
.guide-tech-card:hover{
  transform:translateX(3px);
  border-color:rgba(23,77,108,.44);
  box-shadow:
    0 15px 32px rgba(23,77,108,.08),

/* Círculo azul hielo con copo: misma columna que 01, 02, 03, 04 */
.tech-icon{
  position:absolute;
  left:calc(-1 * var(--content-left) + var(--marker-left) - 46px / 2);
  top:50%;
  transform:translateY(-50%);

  width:46px;
  height:46px;
  border-radius:50%;

    background:#2b6f92;

  display:flex;

  font-size:35px;
  line-height:1;

    box-shadow:
    0 10px 22px rgba(47,127,166,.22),
    0 0 14px rgba(130,205,238,.20),
    inset 0 0 0 1px rgba(255,255,255,.32);

  z-index:5;
}

/* Borde punteado alrededor del círculo azul hielo */
.tech-icon::before{
  content:"";
  position:absolute;
  inset:-6px;
  border-radius:50%;
  border:1px dashed rgba(75,151,190,.34);
  pointer-events:none;
}

/* Segmento punteado que conecta por arriba y por abajo el círculo azul hielo */
.tech-icon::after{
  content:"";
  position:absolute;
  left:50%;
  top:-42px;
  transform:translateX(-50%);
  width:1px;
  height:calc(100% + 84px);
  border-left:1px dashed rgba(75,151,190,.26);
  z-index:-1;
}
/* Elimina el punto verde lateral de los capítulos técnicos I y II */
.guide-tech-card .tech-content::before{
  content:none;

/* Botones técnico-didácticos para IV, V y VI */
.snow-tech-card{
  --cut:6px;
  --cut2:12px;

  --ice-text:#174d6c;
  --ice-main:#174d6c;
  --ice-border:rgba(23,77,108,.34);
  --ice-border-soft:rgba(23,77,108,.22);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:54px;

  display:grid;
  grid-template-columns:1fr;
  align-items:center;

  margin:1.4% 0 1.5%;
  padding:0 3.8% 0 6.4%;

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease;
}

.snow-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
    linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
    rgba(214,237,247,.20);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

.snow-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

.snow-tech-card:hover{
  transform:translateX(3px);
  box-shadow:
    0 15px 32px rgba(23,77,108,.08),
    inset 0 0 0 1px rgba(255,255,255,.68);

.snow-tech-icon{
  position:absolute;
  left:calc(-1 * var(--content-left) + var(--marker-left) - 46px / 2);

/* Botones técnicos X, XI, XII y XIII */
.summit-tech-card{
  --cut:6px;
  --cut2:12px;

  --ice-text:#174d6c;
  --ice-border:rgba(23,77,108,.34);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:52px;

  display:grid;
  grid-template-columns:1fr;
  align-items:center;

  margin:1.15% 0 1.25%;
  padding:0 3.8% 0 6.4%;

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;

  transition:
    transform .25s ease,
    box-shadow .25s ease;
}

.summit-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
    linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
    rgba(214,237,247,.20);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

.summit-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

/* Botones técnicos XIV, XV, XVI */
.expedition-tech-card{
  --cut:6px;
  --cut2:12px;

  --ice-text:#174d6c;
  --ice-border:rgba(23,77,108,.34);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:54px;

  display:grid;
  grid-template-columns:1fr;
  align-items:center;

  margin:1.4% 0 1.5%;
  padding:0 3.8% 0 6.4%;

  color:var(--ice-text);
  cursor:pointer;
  text-align:left;

  overflow:visible;
  border:none;
  background:transparent;
  box-shadow:none;

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease;
}

.expedition-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;

  background:
    linear-gradient(90deg, rgba(23,77,108,.075), rgba(255,253,247,.86)),
    rgba(214,237,247,.20);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  box-shadow:0 10px 24px rgba(22,16,10,.04);
}

.expedition-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,

    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

/* Caja técnica azul, estilo página 38 */
.tenth-tech-card{
  --cut:7px;
  --cut2:14px;
  --ice-text:#245b7c;
  --ice-border:rgba(54,116,154,.34);
  --card-border:var(--ice-border);

  position:relative;
  width:100%;
  min-height:64px;
  display:grid;
  grid-template-columns:1fr;
  align-items:center;
  margin:0 0 4.6%;
  padding:0 3.6% 0 6%;
  text-align:left;
  color:var(--ice-text);
  border:none;
  background:transparent;
  overflow:visible;
  box-shadow:none;
  cursor:pointer;
  transition:transform .24s ease, box-shadow .24s ease;
}

.tenth-tech-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    linear-gradient(90deg, rgba(55,120,158,.08), rgba(255,253,247,.90)),
    rgba(214,237,247,.26);

  -webkit-mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;

  mask:
    radial-gradient(circle var(--cut) at 0 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 0, transparent calc(var(--cut) - .5px), #000 var(--cut)) top right / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 0 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom left / 50% 50% no-repeat,
    radial-gradient(circle var(--cut) at 100% 100%, transparent calc(var(--cut) - .5px), #000 var(--cut)) bottom right / 50% 50% no-repeat;
}

.tenth-tech-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) top / calc(100% - var(--cut2)) 1px no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      left var(--cut) bottom / calc(100% - var(--cut2)) 1px no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      left top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,
    linear-gradient(var(--card-border), var(--card-border))
      right top var(--cut) / 1px calc(100% - var(--cut2)) no-repeat,
    radial-gradient(
      circle var(--cut) at 0 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top left / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(
      circle var(--cut) at 100% 0,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) top right / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(
      circle var(--cut) at 0 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom left / var(--cut2) var(--cut2) no-repeat,
    radial-gradient(
      circle var(--cut) at 100% 100%,
      transparent calc(var(--cut) - 1px),
      var(--card-border) calc(var(--cut) - .5px),
      var(--card-border) calc(var(--cut) + .5px),
      transparent calc(var(--cut) + 1px)
    ) bottom right / var(--cut2) var(--cut2) no-repeat;
}

.tenth-tech-card:hover{
  transform:translateX(3px);
}

.tenth-tech-icon{
  position:absolute;
  left:calc(-1 * var(--content-left) + var(--marker-left) - var(--tech-size) / 2);
  top:50%;
  transform:translateY(-50%);
  width:var(--tech-size);

.tenth-guide-comment{

}

.tenth-guide-comment::before{
  content:"";

    radial-gradient(circle at 18% 0%, rgba(255,255,255,.24), transparent 34%),

        <p class="ice-science-subtitle">
          La respuesta visible del glaciar ante su balance de masa.

        <div class="ice-science-line"></div>

        <p>
          Un glaciar cambia según la relación entre la nieve que gana en la zona alta y el hielo que pierde en la zona baja. A esa relación se le llama balance de masa.
        </p>

        <p>
          Si acumula más de lo que pierde, puede avanzar. Si gana y pierde casi lo mismo, se mantiene en equilibrio. Si pierde más de lo que recibe, retrocede.
        </p>

        <div class="ice-science-note">
          Infografía: acumulación, ablación, línea de equilibrio, avance, estabilidad y retroceso glaciar.

  <script>
    const bookElement = document.getElementById('book');
const pageCounter = document.getElementById('pageCounter');
const stageElement = document.querySelector('.stage');
const fullscreenBtn = document.getElementById('fullscreenBtn');
let pageFlip;
let isFlipping = false;

    function getPageSize(){
      const stage = stageElement.getBoundingClientRect();
      const isPortrait = window.matchMedia('(orientation: portrait)').matches;
      const availableW = Math.max(300, stage.width - 12);
      const availableH = Math.max(420, stage.height - 12);

      if(isPortrait){
        // Proporción cercana a 2121 x 3000 para móviles: 0.707.
        const ratio = 2121 / 3000;
        let h = availableH * 0.992;
        let w = h * ratio;
        if(w > availableW * 0.992){
          w = availableW * 0.992;
          h = w / ratio;
        }
        return { width: Math.round(w), height: Math.round(h) };
      }

      // Página horizontal única, tipo revista abierta.
      const ratio = 1.72;
      let h = availableH * 0.992;
      let w = h * ratio;
      if(w > availableW * 0.992){
        w = availableW * 0.992;
        h = w / ratio;
      }
      return { width: Math.round(w), height: Math.round(h) };
    }

   function populatePages(){
  bookElement.innerHTML = '';

  const isPortrait = window.matchMedia('(orientation: portrait)').matches;

  document.querySelectorAll('template[data-page]').forEach((template)=>{
    const isMobileOnly = template.hasAttribute('data-mobile-only');
    const isDesktopOnly = template.hasAttribute('data-desktop-only');

    // En laptop/horizontal, no cargo páginas solo móviles
    if(isMobileOnly && !isPortrait) return;

    // En móvil/vertical, no cargo páginas solo laptop
    if(isDesktopOnly && isPortrait) return;

    bookElement.appendChild(template.content.firstElementChild.cloneNode(true));
  });
}

    function updateCounter(){
  if(!pageFlip) return;
  const current = pageFlip.getCurrentPageIndex() + 1;
  const total = pageFlip.getPageCount();
  pageCounter.textContent = `Página ${current} / ${total}`;
  updateFullscreenButton();
}
function updateFullscreenButton(){
  if(!pageFlip || !fullscreenBtn) return;

  const current = pageFlip.getCurrentPageIndex();
  const isFirstPage = current === 0;

  fullscreenBtn.classList.toggle('is-visible', isFirstPage);

  const isFullscreen =
    document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.msFullscreenElement;

  fullscreenBtn.classList.toggle('is-fullscreen', !!isFullscreen);
  fullscreenBtn.textContent = isFullscreen ? '×' : '⛶';
  fullscreenBtn.setAttribute(
    'aria-label',
    isFullscreen ? 'Salir de pantalla completa' : 'Ver en pantalla completa'
  );
  fullscreenBtn.setAttribute(
    'title',
    isFullscreen ? 'Salir de pantalla completa' : 'Pantalla completa'
  );
}

async function toggleFullscreen(){
  const fullscreenElement =
    document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.msFullscreenElement;

  try{
    if(!fullscreenElement){
      const target = stageElement;

      if(target.requestFullscreen){
        await target.requestFullscreen();
      }else if(target.webkitRequestFullscreen){
        target.webkitRequestFullscreen();
      }else if(target.msRequestFullscreen){
        target.msRequestFullscreen();
      }else{
        console.warn('Este navegador no soporta fullscreen API en este contexto.');
      }
    }else{
      if(document.exitFullscreen){
        await document.exitFullscreen();
      }else if(document.webkitExitFullscreen){
        document.webkitExitFullscreen();
      }else if(document.msExitFullscreen){
        document.msExitFullscreen();
      }
    }
  }catch(error){
    console.warn('No se pudo cambiar a pantalla completa:', error);
  }

  updateFullscreenButton();
}

if(fullscreenBtn){
  fullscreenBtn.addEventListener('click', async (event)=>{
    event.preventDefault();
    event.stopPropagation();
    await toggleFullscreen();
  });
}

    function initReader(startPage=0){
      populatePages();
      const size = getPageSize();
      pageFlip = new St.PageFlip(bookElement,{
        width:size.width,
        height:size.height,
        size:'fixed',
        showCover:false,
        usePortrait:true,
        drawShadow:true,
        maxShadowOpacity:.12,
        flippingTime:1050,
        startZIndex:0,
        mobileScrollSupport:false,
        clickEventForward:true,
        useMouseEvents:true,
        swipeDistance:14,
        showPageCorners:true,
        disableFlipByClick:false,
        autoSize:false
      });
      pageFlip.loadFromHTML(bookElement.querySelectorAll('.page'));
      pageFlip.turnToPage(Math.min(startPage,pageFlip.getPageCount()-1));
      pageFlip.on('flip',()=>{isFlipping=false;updateCounter();});
pageFlip.on('changeState',(e)=>{isFlipping=e.data==='flipping';});
updateCounter();
updateFullscreenButton();
    }

    function goNext(){if(!pageFlip||isFlipping)return;pageFlip.flipNext();}
    function goPrev(){if(!pageFlip||isFlipping)return;pageFlip.flipPrev();}

 function goToPageByKey(pageKey){
  if(!pageFlip || isFlipping) return;

  const pages = Array.from(bookElement.querySelectorAll('.page'));
  const targetIndex = pages.findIndex((page)=> page.dataset.pageKey === pageKey);

  if(targetIndex >= 0){
    pageFlip.turnToPage(targetIndex);
    updateCounter();
  }
}

bookElement.addEventListener('click',(event)=>{
const guideButton = event.target.closest('.guide-tech-card, .snow-tech-card, .summit-tech-card, .expedition-tech-card, .sixth-tech-card');

  if(guideButton){
    event.preventDefault();
    event.stopPropagation();

    const targetKey = guideButton.dataset.goKey;
    goToPageByKey(targetKey);
    return;
  }

  const trigger = event.target.closest('#openBookTrigger, #mobileOpenBookTrigger');

  if(trigger){
    event.stopPropagation();
    goNext();
    return;
  }

  const rect=bookElement.getBoundingClientRect();
  const x=event.clientX-rect.left;
  x>rect.width/2 ? goNext() : goPrev();
});

    window.addEventListener('keydown',(event)=>{
      const tag=document.activeElement?.tagName?.toLowerCase();
      if(tag==='input'||tag==='textarea'||tag==='select') return;
      if(event.key==='ArrowRight'){event.preventDefault();goNext();}
      if(event.key==='ArrowLeft'){event.preventDefault();goPrev();}
    });

    let resizeTimer;
    window.addEventListener('resize',()=>{
      clearTimeout(resizeTimer);
      resizeTimer=setTimeout(()=>{
        const current=pageFlip ? pageFlip.getCurrentPageIndex() : 0;
        initReader(current);
      },220);
    });
document.addEventListener('fullscreenchange', updateFullscreenButton);
document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
document.addEventListener('msfullscreenchange', updateFullscreenButton);
    window.addEventListener('load',()=>initReader(0));
  </script>
</body>
